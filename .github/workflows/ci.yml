name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repoyu Cek
        uses: actions/checkout@v6

      - name: pnpm Kur
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Node.js Kur
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Bagımlılıkları Yukle
        run: pnpm install --frozen-lockfile

      - name: TypeScript Kontrolu
        run: pnpm type-check
